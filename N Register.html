<html>
    <head>
        <title>Bloom Basket Registration</title>
        <style>
            .body {
                
                margin: 0px;
                padding: 0px;
                border: 5px solid rgb(14, 202, 27);
                -webkit-box-shadow:0px 10px 49px-14px rgba(0,0,0,0.7);
                -moz-box-shadow:0px 10px 49px-14px rgba(0,0,0,0.7);
                box-shadow:0px 10px 49px-14px rgba(0,0,0,0.7);
                
            }
            .main {
                text-align: center;
                font-weight: bold;
                border-radius: 80px;
                margin: 80px;
                padding: 10px;
                height:400px ;
                width: 400px;
                border: 3px solid rgb(228, 160, 207);
                margin-left: 450px;
                margin-top: 120px;
                background-color:#ffff;
                -webkit-box-shadow:0px 10px 49px-14px rgba(0,0,0,0.7);
                -moz-box-shadow:0px 10px 49px-14px rgba(0,0,0,0.7);
                box-shadow:0px 10px 49px-14px rgba(0,0,0,0.7);
                
            }
            #fname,
            #lname,
            #password,
            #cpassword,
            #one {
                border: 2px solid rgb(red, green, blue);
                border-radius: 30px;
                margin: 2px;
                padding: 3px;
                
            
                
            }
            a {
                text-decoration: none;
                color: black;
            }
            a:hover {
                color: blue;
                text-decoration: underline;
            }
            #parg:hover {
                color: blue;
            }
            button {
                background-color: rgb(237, 109, 199);
                font-size: 15px;
                font-weight: bold;
                gap: 20px;
                justify-content: space-between;
                
            }
            button:hover {
                background-color:rgb(236, 148, 211);
                color: blue;
                
            }
        
            
        </style>
    </head>
    <body background="https://static.vecteezy.com/system/resources/previews/024/264/951/non_2x/blurred-spring-background-nature-with-blooming-glade-generative-ai-technology-free-photo.jpg">
        
       <!--- <form action="" method="get">  -->
            <div class="main" >
               <!--- <header style="font-family: Edwardian Script ITC; color: rgb(47, 68, 255); font-size: 40px;">Bloom Basket</header> -->
                <h1>Register</h1><br><br>
                <label>First Name : </label>
                <input type="text" name="first name" id="fname" placeholder="First Name" maxlength="50" required><br><br>
                <label>Last Name : </label>
                <input type="text" name="last name" id="lname" placeholder="Last Name" maxlength="50" required><br><br>
                <label>Password : </label>
                <input type="password" name="password" id="password" placeholder="Password" maxlength="8" required><br><br>
                <label>Confirm Password : </label>
                <input type="password" name="confirm password" id="cpassword" placeholder="Confirm Password" maxlength="8"required><br><br>
                <!--
                <button type="button" name="Create My Account" id="one"><b><a href="N Sucess.html">Create My Account</a></b></button><br><br>
                <p><a href="Nursery.html" target=" ">Return to store</a></p>
            -->
                <button type="button" onclick="register()" id="one">Register</button>
                
                <p><a href="Nursery.html" target=" " id="parg">Return to store</a></p>
            </div>
            <!--  </form>   -->

        
            <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
            <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
            <script>

                // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID",
  measurementId: "YOUR_MEASUREMENT_ID"
};

                firebase.initializeApp(firebaseConfig);
                var database=firebase.database();
                function register() {
                    var fname=document.getElementById("fname").value;
                    var lname=document.getElementById("lname").value;
                    var password=document.getElementById("password").value;
                    var cpassword=document.getElementById("cpassword").value;
        
                    if(fname=="" || lname=="" || password=="" || cpassword=="") {
                        alert("All fields are required");
                        return;
                    }
                    if(password !== cpassword) {
                        alert("Password do not match");
                        return;
                    }
                    database.ref("registrations/"+fname).push ({
                        fname:fname,
                        lname:lname,
                        password:password,
                        
                    })
                    .then (() => {

                        alert("Registration Successful");
                        window.location.href="N Sucess.html";
                })
                .catch((error) => {
                    alert("Error: " +error.message);
                });
            }
            </script>
        

    </body>
</html>
